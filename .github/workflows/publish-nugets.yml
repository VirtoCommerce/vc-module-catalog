# v3.800.39
# https://virtocommerce.atlassian.net/browse/VCST-5246
name: Publish nuget

on:
  workflow_dispatch:
    inputs:
      publishAlpha:
        description: 'Publish nuget as alpha version.'
        required: true
        default: true
        type: boolean

# Least-privilege default; publish-nuget overrides below.
permissions:
  contents: read

jobs:
  test:
    uses: VirtoCommerce/.github/.github/workflows/test-and-sonar.yml@v3.800.39    
    secrets:
      sonarToken: ${{ secrets.SONAR_TOKEN }}

  build:
    uses: VirtoCommerce/.github/.github/workflows/build.yml@v3.800.39    
    with:
      uploadPackage: 'true'
      uploadDocker: 'false'
      forceVersionSuffix: ${{ github.event.inputs.publishAlpha }}
    secrets:
      envPAT: ${{ secrets.REPO_TOKEN }}

  publish-nuget:
    # publish-github.yml creates the release + edits the PR via the passed GITHUB_TOKEN — grant write to both.
    permissions:
      contents: write
      pull-requests: write
    needs:
      [build, test]
    uses: VirtoCommerce/.github/.github/workflows/publish-github.yml@v3.800.39
    with:
      fullKey: ${{ needs.build.outputs.packageFullKey }}
      forceGithub: false
      forceBlob: true
    secrets:
      envPAT: ${{ secrets.GITHUB_TOKEN }}
      nugetKey: ${{ secrets.NUGET_KEY }}
      BLOB_TOKEN: ${{ secrets.BLOB_TOKEN }}
