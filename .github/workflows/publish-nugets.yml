# v3.800.40
# https://virtocommerce.atlassian.net/browse/VCST-5305
name: Publish nuget

on:
  workflow_dispatch:
    inputs:
      publishAlpha:
        description: 'Publish nuget as alpha version.'
        required: true
        default: true
        type: boolean

# Least-privilege default; publish-nuget overrides below.
permissions:
  contents: read

jobs:
  test:
    uses: VirtoCommerce/.github/.github/workflows/test-and-sonar.yml@v3.800.40    
    secrets:
      sonarToken: ${{ secrets.SONAR_TOKEN }}

  build:
    uses: VirtoCommerce/.github/.github/workflows/build.yml@v3.800.40    
    with:
      uploadPackage: 'true'
      uploadDocker: 'false'
      forceVersionSuffix: ${{ github.event.inputs.publishAlpha }}
    secrets:
      envPAT: ${{ secrets.REPO_TOKEN }}

  # NuGet Trusted Publishing: the push happens inside the cross-repo reusable publish-github.yml,
  # whose job_workflow_ref points at the .github repo and so can't match a policy scoped to this
  # repo. So we mint the short-lived key HERE (job_workflow_ref = publish-nugets.yml) and pass it
  # into the reusable workflow via its existing nugetKey secret. Runs after build so the ~1h key is
  # minted right before publish.
  nuget-login:
    needs: [build, test]
    permissions:
      id-token: write
    runs-on: ubuntu-24.04
    outputs:
      key: ${{ steps.login.outputs.NUGET_API_KEY }}
    steps:
      - name: NuGet login (OIDC -> temp API key)
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          # nuget.org username of the account that CREATED the trust policy (a shared service
          # account, org member). Org-level GitHub Actions variable so every repo inherits it.
          user: ${{ vars.NUGET_TRUSTED_USER }}
      # Job outputs aren't masked across jobs; mask so the key never prints in downstream logs.
      - name: Mask API key
        run: echo "::add-mask::${{ steps.login.outputs.NUGET_API_KEY }}"

  publish-nuget:
    # publish-github.yml creates the release + edits the PR via the passed GITHUB_TOKEN — grant write to both.
    permissions:
      contents: write
      pull-requests: write
    needs:
      [build, test, nuget-login]
    uses: VirtoCommerce/.github/.github/workflows/publish-github.yml@v3.800.40
    with:
      fullKey: ${{ needs.build.outputs.packageFullKey }}
      forceGithub: false
      forceBlob: true
    secrets:
      envPAT: ${{ secrets.GITHUB_TOKEN }}
      nugetKey: ${{ needs.nuget-login.outputs.key }}
      BLOB_TOKEN: ${{ secrets.BLOB_TOKEN }}
