# v3.800.39
# https://virtocommerce.atlassian.net/browse/VCST-5246
name: Module CI

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - 'build/**'
      - 'README.md'
      - 'LICENSE'
      - '**/argoDeploy.json'
      - '**/cloudDeploy.json'
      - samples/**
    branches:
      [master, main, dev]
  pull_request:
    branches:
      [master, main, dev]
    paths-ignore:
      - 'docs/**'
      - 'build/**'
      - 'README.md'
      - 'LICENSE'
      - '**/argoDeploy.json'
      - '**/cloudDeploy.json'
      - samples/**

# Least-privilege default; jobs override below where they need more.
permissions:
  contents: read

jobs:
  ci:
    if: ${{ github.actor != 'dependabot[bot]' &&
        (github.event.pull_request.head.repo.full_name == github.repository ||
        github.event.pull_request.head.repo.full_name == '') }}  # Check that PR not from forked repo and not from Dependabot
    runs-on: ubuntu-24.04
    # Default GITHUB_TOKEN creates the release + updates the PR; rest uses the REPO_TOKEN PAT.
    permissions:
      contents: write
      pull-requests: write
    env:
      CLOUD_INSTANCE_BASE_URL: ${{secrets.CLOUD_INSTANCE_BASE_URL}}
      CLIENT_ID: ${{secrets.CLIENT_ID}}
      CLIENT_SECRET: ${{secrets.CLIENT_SECRET}}
      SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}
      GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
      NUGET_KEY: ${{ secrets.NUGET_KEY }}
      BLOB_SAS: ${{ secrets.BLOB_TOKEN }}
      VERSION_SUFFIX: ''
      BUILD_STATE: 'failed'
      RELEASE_STATUS: 'false'

    outputs:
      artifactUrl: ${{ steps.artifactUrl.outputs.download_url }}
      blobId: ${{ steps.blobRelease.outputs.blobId }}
      jira-keys: ${{ steps.jira_keys.outputs.jira-keys }}
      version: ${{ steps.artifact_ver.outputs.shortVersion }}
      moduleId: ${{ steps.artifact_ver.outputs.moduleId }}
      matrix: ${{ steps.deployment-matrix.outputs.matrix }}
      deployment-folder-exists: ${{ steps.check_deployment_folder.outputs.exists }}
      requiredModulesListUrl: ${{ steps.extract_required_modules_list_url_from_pr.outputs.url }}

    steps:

      - name: Set up Node 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
            node-version: '24'

      - name: Set up Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set RELEASE_STATUS
        if: ${{ (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && github.event_name == 'push' }}
        run: |
          echo "RELEASE_STATUS=true" >> $GITHUB_ENV

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install VirtoCommerce.GlobalTool
        uses: VirtoCommerce/vc-github-actions/setup-vcbuild@master

      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Get Changelog
        id: changelog
        uses: VirtoCommerce/vc-github-actions/changelog-generator@master

      - name: Get Artifact Version
        uses: VirtoCommerce/vc-github-actions/get-image-version@master
        id: artifact_ver

      - name: Check if .deployment folder exists
        id: check_deployment_folder
        run: |
          if [ -d ".deployment" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Diagnostic: .deployment folder exists."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Diagnostic: .deployment folder does NOT exist."
          fi

      - name: Set VERSION_SUFFIX variable
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then
            echo "VERSION_SUFFIX=${STEPS_ARTIFACT_VER_OUTPUTS_FULLSUFFIX}" >> $GITHUB_ENV
          else
            echo "VERSION_SUFFIX=${STEPS_ARTIFACT_VER_OUTPUTS_SUFFIX}" >> $GITHUB_ENV
          fi;
        env:
          STEPS_ARTIFACT_VER_OUTPUTS_FULLSUFFIX: ${{ steps.artifact_ver.outputs.fullSuffix }}
          STEPS_ARTIFACT_VER_OUTPUTS_SUFFIX: ${{ steps.artifact_ver.outputs.suffix }}

      - name: Add version suffix
        if: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}
        uses: VirtoCommerce/vc-github-actions/add-version-suffix@master
        with:
          versionSuffix: ${{ env.VERSION_SUFFIX }}

      - name: SonarCloud Begin
        uses: VirtoCommerce/vc-github-actions/sonar-scanner-begin@master
        with:
          repoOrg: ${{ github.repository_owner }}
          sonarOrg: ${{secrets.SONAR_ORG_KEY}}

      - name: Build
        run: vc-build Compile

      - name: Unit Tests
        run: vc-build Test -skip

      - name: SonarCloud End
        uses: VirtoCommerce/vc-github-actions/sonar-scanner-end@master

      - name: Quality Gate
        uses: VirtoCommerce/vc-github-actions/sonar-quality-gate@master
        with:
          login: ${{secrets.SONAR_TOKEN}}

      - name: Packaging
        run: vc-build Compress -skip Clean+Restore+Compile+Test

      - name: Publish Nuget
        if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
        uses: VirtoCommerce/vc-github-actions/publish-nuget@master

      - name: Publish to Blob
        if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/master') || (github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main') }}
        id: blobRelease
        uses: VirtoCommerce/vc-github-actions/publish-blob-release@master
        with:
          blobSAS: ${{ secrets.BLOB_TOKEN }}
          blobUrl: ${{ vars.BLOB_URL }}

      - name: Sanitize branch name
        if: ${{ github.event_name == 'pull_request' }}
        id: sanitize_branch
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          # Keep only alphanumeric, hyphens, underscores, and forward slashes and limit length to 255 characters.
          SANITIZED_BRANCH=$(printf '%s\n' "$BRANCH_NAME" | sed 's/[^-a-zA-Z0-9_/]//g' | cut -c1-255)
          if [ -z "$SANITIZED_BRANCH" ]; then
            echo "branch name is empty"
            exit 1
          else
            echo "branchName=$SANITIZED_BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Add Jira link
        if: ${{ github.event_name == 'pull_request' }}
        uses: VirtoCommerce/vc-github-actions/publish-jira-link@master
        with:
          branchName: ${{ steps.sanitize_branch.outputs.branchName }}
          repoOrg: ${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add link to PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: VirtoCommerce/vc-github-actions/publish-artifact-link@master
        with:
          artifactUrl: ${{ steps.blobRelease.outputs.packageUrl }}
          repoOrg: ${{ github.repository_owner }}
          downloadComment: 'Artifact URL:'

      - name: Publish Github Release
        if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
        id: githubRelease
        with:
          changelog: ${{ steps.changelog.outputs.changelog }}
          organization: ${{ github.repository_owner }}
        uses: VirtoCommerce/vc-github-actions/publish-github-release@master

      - name: Set artifactUrl value
        id: artifactUrl
        run: |
          if [ "${GITHUB_REF}" = 'refs/heads/master' ] || [ "${GITHUB_REF}" = 'refs/heads/main' ]; then
            echo "download_url=${STEPS_GITHUBRELEASE_OUTPUTS_DOWNLOADURL}" >> $GITHUB_OUTPUT
          else
            echo "download_url=${STEPS_BLOBRELEASE_OUTPUTS_PACKAGEURL}" >> $GITHUB_OUTPUT
          fi;
        env:
          STEPS_GITHUBRELEASE_OUTPUTS_DOWNLOADURL: ${{ steps.githubRelease.outputs.downloadUrl }}
          STEPS_BLOBRELEASE_OUTPUTS_PACKAGEURL: ${{ steps.blobRelease.outputs.packageUrl }}

      - name: Create deployment matrix
        if: ${{ github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
        uses: VirtoCommerce/vc-github-actions/cloud-create-deploy-matrix@master
        id: deployment-matrix
        with:
          deployConfigPath: '.deployment/module/cloudDeploy.json'
          releaseBranch: 'master'

      - name: Extract required modules list URL from the pull request description
        if: ${{ github.event_name == 'pull_request' }}
        id: extract_required_modules_list_url_from_pr
        shell: pwsh
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          $text = $env:PR_BODY
          $url = ''
          if ($null -ne $text) {
            $pattern = 'Required modules list URL\s*:?\s*(https?://[^\s)>\]]+)'
            $m = [regex]::Match($text, $pattern, 'IgnoreCase')
            if ($m.Success) {
              $candidate = $m.Groups[1].Value.TrimEnd('.', ',', ';')
              if ($candidate -match '\.json($|\?)') {
                $url = $candidate
              } else {
                Write-Host "Candidate URL '$candidate' is not a .json file; ignoring."
              }
            }
          }

          if ([string]::IsNullOrWhiteSpace($url) -eq $false) {
            Write-Host "url found: $url"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "url=$url"
          } else {
            Write-Host "url NOT found"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "url="
          }

      - name: Setup Git Credentials
        if: ${{ (github.ref == 'refs/heads/dev' && github.event_name != 'workflow_dispatch') || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
        uses: VirtoCommerce/vc-github-actions/setup-git-credentials-github@master
        with:
          githubToken: ${{ secrets.REPO_TOKEN }}

      # NOTE: This step is intentionally NOT gated on swagger-validation. In the normal flow swagger
      # runs (and must pass) on the PR into dev before code is merged, so anything reaching dev/master/main
      # is already validated. The only uncovered case is a direct push that bypasses the PR; that is closed
      # by the branch protection rule on dev (required swagger check + no direct pushes), not in-workflow.
      - name: Publish Manifest
        if: ${{ (github.ref == 'refs/heads/dev' && github.event_name != 'workflow_dispatch') || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
        uses: VirtoCommerce/vc-github-actions/publish-manifest@master
        with:
          packageUrl: ${{ steps.artifactUrl.outputs.download_url }}

      - name: Parse Jira Keys from All Commits
        uses: VirtoCommerce/vc-github-actions/get-jira-keys@master
        if: always()
        id: jira_keys
        with:
          release: ${{ env.RELEASE_STATUS }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Build Info to Jira
        if: ${{ env.CLOUD_INSTANCE_BASE_URL != 0 && env.CLIENT_ID != 0 && env.CLIENT_SECRET != 0 && steps.jira_keys.outputs.jira-keys != '' && always() }}
        id: push_build_info_to_jira
        uses: VirtoCommerce/jira-upload-build-info@master
        with:
          cloud-instance-base-url: '${{ secrets.CLOUD_INSTANCE_BASE_URL }}'
          client-id: '${{ secrets.CLIENT_ID }}'
          client-secret: '${{ secrets.CLIENT_SECRET }}'
          pipeline-id: '${{ github.repository }} ${{ github.workflow }}'
          build-number: ${{ github.run_number }}
          build-display-name: 'Workflow: ${{ github.workflow }} (#${{ github.run_number }})'
          build-state: '${{ env.BUILD_STATE }}'
          build-url: '${{github.event.repository.url}}/actions/runs/${{github.run_id}}'
          update-sequence-number: '${{ github.run_id }}'
          last-updated: '${{github.event.head_commit.timestamp}}'
          issue-keys: '${{ steps.jira_keys.outputs.jira-keys }}'
          commit-id: '${{ github.sha }}'
          repo-url: '${{ github.event.repository.url }}'
          build-ref-url: '${{ github.event.repository.url }}/actions/runs/${{ github.run_id }}'

      - name: Confirm Jira Build Output
        if: success()
        run: |
          echo "Jira Upload Build Info response: ${STEPS_PUSH_BUILD_INFO_TO_JIRA_OUTPUTS_RESPONSE}"
        env:
          STEPS_PUSH_BUILD_INFO_TO_JIRA_OUTPUTS_RESPONSE: ${{ steps.push_build_info_to_jira.outputs.response }}

  auto-tests:
    if: ${{ ((github.ref == 'refs/heads/dev') && (github.event_name == 'push')) ||
        (github.event_name == 'workflow_dispatch') || ((github.base_ref == 'dev') && (github.event_name == 'pull_request')) }}
    needs: ci
    uses: VirtoCommerce/.github/.github/workflows/pytest-tests.yml@v3.800.39
    with:
      installModules: 'false'
      installCustomModule: 'true'
      customModuleId:  ${{ needs.ci.outputs.moduleId }}
      customModuleUrl:  ${{ needs.ci.outputs.artifactUrl }}
      requiredModulesListUrl: ${{ needs.ci.outputs.requiredModulesListUrl }}
      vctestingRepoBranch: 'dev'
      frontendZipUrl: 'latest'
      testSuites: 'graphql,restapi,e2e'   
    secrets:
      appInsightsInstrumentationKey: ${{ secrets.E2E_APPINSIGHTSINSTRUMENTATIONKEY }}
      envPAT: ${{ secrets.REPO_TOKEN }}
      testSecretEnvFile: ${{ secrets.VC_TESTING_MODULE_ENV_FILE }}
      sendgridApiKey: ${{ secrets.SENDGRID_APIKEY_4E2E_AUTOTESTS }}

  swagger-validation:
    if: ${{ github.ref == 'refs/heads/dev' ||
        (github.event_name == 'pull_request' && github.base_ref == 'dev') }}
    needs: ci
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Install VirtoCommerce.GlobalTool
        uses: VirtoCommerce/vc-github-actions/setup-vcbuild@master

      - name: Swagger validation
        uses: VirtoCommerce/vc-github-actions/docker-env@master
        with:
          appInsightsInstrumentationKey: ${{ secrets.E2E_APPINSIGHTSINSTRUMENTATIONKEY }}
          githubUser: ${{ github.actor }}
          githubToken: ${{ secrets.REPO_TOKEN }}
          installSampleData: 'false'
          installModules: 'false'
          installCustomModule: 'true'
          customModuleId: ${{ needs.ci.outputs.moduleId }}
          customModuleUrl: ${{ needs.ci.outputs.artifactUrl }}
          requiredModulesListUrl: ${{ needs.ci.outputs.requiredModulesListUrl }}
          platformImage: ghcr.io/virtocommerce/platform

  deploy-cloud:
    # always() + explicit result checks: swagger-validation only runs on the dev flow, so it is
    # 'skipped' on master/main pushes. Deploy when swagger passed (dev) or was skipped (master/main),
    # but block when it failed (e.g. a direct push to dev that bypassed branch protection).
    if: ${{ always()
      && needs.ci.result == 'success'
      && (needs.swagger-validation.result == 'success' || needs.swagger-validation.result == 'skipped')
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
      && github.event_name == 'push'
      && needs.ci.outputs.deployment-folder-exists == 'true'}}
    needs: [ci, swagger-validation]
    # deploy-cloud.yml writes deployment status via GITHUB_TOKEN; rest uses inherited PATs.
    permissions:
      contents: read
      deployments: write
    uses: VirtoCommerce/.github/.github/workflows/deploy-cloud.yml@v3.800.39
    with:
      releaseSource: module
      moduleId: ${{ needs.ci.outputs.moduleId }}
      moduleVer: ${{ needs.ci.outputs.version }}
      moduleBlob: ${{ needs.ci.outputs.blobId }}
      jiraKeys: ${{ needs.ci.outputs.jira-keys }}
      matrix: '{"include":${{ needs.ci.outputs.matrix }}}'
    secrets: inherit # zizmor: ignore[secrets-inherit] deploy-cloud.yml@v3.800.39 reads undeclared org secrets; explicit passing needs a new release + tag bump
