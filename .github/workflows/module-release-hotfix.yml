# v3.800.40
# https://virtocommerce.atlassian.net/browse/VCST-5305
name: Release hotfix

on:
  workflow_dispatch:
    inputs:
      incrementPatch:
        description: 'Increment patch version.'
        required: true
        default: true
        type: boolean

# Least-privilege default; publish-github-release overrides below.
permissions:
  contents: read

jobs:
  test:
    uses: VirtoCommerce/.github/.github/workflows/test-and-sonar.yml@v3.800.40
    secrets:
      sonarToken: ${{ secrets.SONAR_TOKEN }}

  build:
    uses: VirtoCommerce/.github/.github/workflows/build.yml@v3.800.40    
    with:
      uploadPackage: 'true'
      uploadDocker: 'false'
      forceVersionSuffix: 'false'
      incrementPatch: ${{ github.event.inputs.incrementPatch }}
    secrets:
      envPAT: ${{ secrets.REPO_TOKEN }}

  get-metadata:
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Get Changelog
      id: changelog
      uses: VirtoCommerce/vc-github-actions/changelog-generator@master

  # NuGet Trusted Publishing: the push happens inside the cross-repo reusable publish-github.yml,
  # whose job_workflow_ref points at the .github repo and so can't match a policy scoped to this
  # repo. So we mint the short-lived key HERE (job_workflow_ref = module-release-hotfix.yml) and
  # pass it into the reusable workflow via its existing nugetKey secret. Runs after build so the
  # ~1h key is minted right before publish.
  nuget-login:
    needs: [build, test]
    permissions:
      id-token: write
    runs-on: ubuntu-24.04
    outputs:
      key: ${{ steps.login.outputs.NUGET_API_KEY }}
    steps:
      - name: NuGet login (OIDC -> temp API key)
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: VirtoCommerce
      # Job outputs aren't masked across jobs; mask so the key never prints in downstream logs.
      - name: Mask API key
        run: echo "::add-mask::${{ steps.login.outputs.NUGET_API_KEY }}"

  publish-github-release:
    # publish-github.yml creates the release + edits the PR via the passed GITHUB_TOKEN — grant write to both.
    permissions:
      contents: write
      pull-requests: write
    needs:
      [build, test, get-metadata, nuget-login]
    uses: VirtoCommerce/.github/.github/workflows/publish-github.yml@v3.800.40
    with:
      fullKey: ${{ needs.build.outputs.packageFullKey }}
      changeLog: '${{ needs.get-metadata.outputs.changeLog }}'
      incrementPatch: ${{ github.event.inputs.incrementPatch }}
      makeLatest: 'false'

    secrets:
      envPAT: ${{ secrets.GITHUB_TOKEN }}
      nugetKey: ${{ needs.nuget-login.outputs.key }}

  increment-version:
    needs:
      [publish-github-release]
    if: ${{ github.event.inputs.incrementPatch == 'true' }}
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: Install VirtoCommerce.GlobalTool
      uses: VirtoCommerce/vc-github-actions/setup-vcbuild@master

    - name: Setup Git Credentials
      uses: VirtoCommerce/vc-github-actions/setup-git-credentials-github@master
      with:
        githubToken: ${{ secrets.REPO_TOKEN }}

    - name: Increment Version
      run: |
        vc-build IncrementPatch
        git add Directory.Build.props *module.manifest
        git commit -m "ci: Auto IncrementPatch"
        git push
