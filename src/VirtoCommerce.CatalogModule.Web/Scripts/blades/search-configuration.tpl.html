<div class="blade-content __small-narrow">
  <div class="blade-inner">
    <div class="inner-block">
      <!-- Widget-style tiles. The platform's .gridster-cnt centering is scoped under .gridster (not available here),
           so we reproduce the widget look explicitly: 120x120 card, inset border, fa-gray icon, centered 12px/500 label. -->
      <div style="display:flex; flex-wrap:nowrap; gap:10px; padding:8px 0;">
        <div ng-repeat="item in blade.menuItems" ng-click="item.action()"
             style="cursor:pointer; flex:0 0 120px; width:120px; height:120px; background:#fbfdfe; box-shadow:inset 0 0 0 1px #dee9f0;
                    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;">
          <i class="{{ item.icon }} fa-2x fa-gray"></i>
          <div style="font-size:12px; font-weight:500; line-height:1.4; text-align:center; color:#161d25; padding:0 6px;">{{ item.name | translate }}</div>
        </div>
      </div>
    </div>
  </div>
</div>
