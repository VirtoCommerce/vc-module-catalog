<div class="blade-content">
  <div class="blade-inner">
    <div class="inner-block">
      <div class="config-section-detail" style="white-space: normal;">
        <form class="form" name="formScope" style="margin: 0; padding: 0;">
          <va-metaform registered-inputs="blade.metaFields" blade="blade" column-count="6" ng-if="blade.currentEntity" ng-init="setForm(formScope)"></va-metaform>
        </form>
      </div>

      <ul class="list __items" ng-if="blade.currentEntity">
        <li class="list-item"
            ng-if="blade.canShowOptions()"
            ng-class="{'__selected': currentChild === 'options'}"
            ng-click='openChild("options")'>
          <span class="list-t">{{ 'catalog.blades.section-details.labels.options' | translate }}</span>
          <span class="list-descr">{{ 'catalog.blades.section-options-list.subtitle' | translate }}</span>
        </li>
      </ul>
    </div>
  </div>
</div>

<script type="text/ng-template" id="section-type.html">
  <div class="form-input">
    <ui-select ng-model="blade.currentEntity.type" ng-disabled="blade.isTypeChangeDisabled()" required>
      <ui-select-match placeholder="{{ 'catalog.blades.section-details.placeholders.type' | translate }}">{{$select.selected}}</ui-select-match>
      <ui-select-choices repeat="x in blade.sectionTypes | filter: $select.search">
        <span ng-bind-html="x | highlight: $select.search"></span>
      </ui-select-choices>
    </ui-select>
  </div>
</script>
<script type="text/ng-template" id="section-allow-custom-text.html">
  <div class="form-group" ng-if="blade.currentEntity.type === 'Text'">
    <label class="form-label">{{ 'catalog.blades.section-details.labels.allow-custom-text' | translate }}</label>
    <div class="form-input">
      <label class="form-label __switch">
        <input type="checkbox" ng-model="blade.currentEntity.allowCustomText" />
        <span class="switch"></span>
      </label>
    </div>
  </div>
</script>
<script type="text/ng-template" id="section-allow-predefined.html">
  <div class="form-group" ng-if="blade.currentEntity.type === 'Text'">
    <label class="form-label">{{ 'catalog.blades.section-details.labels.allow-predefined-options' | translate }}</label>
    <div class="form-input">
      <label class="form-label __switch">
        <input type="checkbox" ng-model="blade.currentEntity.allowPredefinedOptions" />
        <span class="switch"></span>
      </label>
    </div>
  </div>
</script>
<script type="text/ng-template" id="section-is-required.html">
  <div>
    <label class="form-label">{{ 'catalog.blades.section-details.labels.required' | translate }}</label>
    <div class="form-input">
      <label class="form-label __switch">
        <input type="checkbox" ng-model="blade.currentEntity.isRequired" />
        <span class="switch"></span>
      </label>
    </div>
  </div>
</script>
<script type="text/ng-template" id="section-max-length.html">
  <div class="form-group" ng-if="blade.currentEntity.type === 'Text'">
    <label class="form-label">{{ 'catalog.blades.section-details.labels.max-length' | translate }}</label>
    <div class="form-input">
      <input type="number" min="0" ng-model="blade.currentEntity.maxLength" />
    </div>
  </div>
</script>

<style lang="scss">
  .blade .blade-container .blade-static.config-section-detail .form-group {
    margin: 0;
    padding-top: 0px;
  }

  .blade .blade-container .blade-static.config-section-detail .column .form-group {
    margin: 10px 10px 0 0;
    padding-top: 5px;
  }

  .config-section-detail .form-input input,
  .config-section-detail .form-input textarea {
    background: #fff;
    border-color: #d4d4d4;
  }

  .config-section-detail .form-input textarea {
    min-height: 60px;
    max-height: 60px;
    resize: none;
  }
</style>
